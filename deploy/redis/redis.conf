# 图形检索曲线缓存的 Redis 配置。
# 这是纯缓存用途——数据丢了会自动回源重建，所以关闭持久化、用 LRU 淘汰即可。

# 监听所有网卡（容器内），靠 compose 端口映射 + 防火墙控制访问。
bind 0.0.0.0
protected-mode no

# 安全：务必设置密码（和 backend/.env 里的 FR_REDIS_PASSWORD 保持一致）。
# 取消下面这行注释并改成你的密码；改完记得同步到后端 .env。
# requirepass your_strong_password_here

# 纯缓存：关闭 RDB / AOF 持久化（曲线丢了会自动回源重算）。
save ""
appendonly no

# 内存上限 + 淘汰策略：到顶后按 LRU 淘汰最久未用的 key。
# 全池约 5000 只股、每只 ~40KB，估算上限 1GB 足够；按你机器内存调整。
maxmemory 1gb
maxmemory-policy allkeys-lru
