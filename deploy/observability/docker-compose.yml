# 可观测性栈样例：Prometheus 抓取 backend /metrics，Grafana 展示。
# 起栈：docker compose -f deploy/observability/docker-compose.yml up -d
# 需让 backend 可达（同 docker 网络用服务名 backend:8000，否则改 prometheus.yml 的 targets）。
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: fr-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: fr-grafana
    depends_on: [prometheus]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    restart: unless-stopped
